<script>
// ══════════════════════════════════════════════
// FIREBASE REST API — fonctionne PARTOUT
// Pas de SDK, pas de module, juste fetch()
// ══════════════════════════════════════════════
const FB_API_KEY   = "AIzaSyCj2q0Tpwj_aup5I2UIamZXNer8SvSXgmk";
const FB_AUTH_URL  = "https://identitytoolkit.googleapis.com/v1";
const FB_DB_URL    = "https://linkchat-bbc70-default-rtdb.firebaseio.com";
const FB_PROJECT   = "linkchat-bbc70";

let _idToken = null;
let _uid = null;
let _displayName = null;
let _sseConnections = {};

// ── AUTH ──────────────────────────────────────
async function fbSignInAnonymous() {
  const r = await fetch(`${FB_AUTH_URL}/accounts:signUp?key=${FB_API_KEY}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ returnSecureToken: true })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  _idToken = d.idToken;
  _uid = d.localId;
  return d;
}

async function fbUpdateProfile(displayName) {
  const r = await fetch(`${FB_AUTH_URL}/accounts:update?key=${FB_API_KEY}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ idToken: _idToken, displayName, returnSecureToken: true })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  if (d.idToken) _idToken = d.idToken;
  _displayName = displayName;
}

// ── DATABASE REST ─────────────────────────────
async function fbSet(path, data) {
  const r = await fetch(`${FB_DB_URL}/${path}.json?auth=${_idToken}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

async function fbUpdate(path, data) {
  const r = await fetch(`${FB_DB_URL}/${path}.json?auth=${_idToken}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

async function fbPush(path, data) {
  const r = await fetch(`${FB_DB_URL}/${path}.json?auth=${_idToken}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

async function fbGet(path) {
  const r = await fetch(`${FB_DB_URL}/${path}.json?auth=${_idToken}`);
  if (!r.ok) throw new Error('GET failed: ' + r.status);
  return r.json();
}

// ── SSE REALTIME LISTENER ────────────────────
function fbListen(path, callback, id) {
  if (_sseConnections[id]) { _sseConnections[id].close(); }
  const url = `${FB_DB_URL}/${path}.json?auth=${_idToken}`;
  const es = new EventSource(url);
  es.onmessage = (e) => {
    if (!e.data || e.data === 'null') return;
    try {
      const parsed = JSON.parse(e.data);
      if (parsed && parsed.data !== undefined) callback(parsed.data);
      else if (parsed) callback(parsed);
    } catch(ex) {}
  };
  es.onerror = () => {
    // Reconnect after 3s
    setTimeout(() => fbListen(path, callback, id), 3000);
  };
  _sseConnections[id] = es;
  return es;
}

// Poll fallback for rooms/contacts (SSE on large paths can be slow)
function fbPoll(path, callback, id, interval=3000) {
  if (_sseConnections[id]) clearInterval(_sseConnections[id]);
  const run = async () => {
    try {
      const data = await fbGet(path);
      callback(data);
    } catch(e) {}
  };
  run();
  _sseConnections[id] = setInterval(run, interval);
}

function fbStopListen(id) {
  if (!_sseConnections[id]) return;
  const c = _sseConnections[id];
  if (typeof c.close === 'function') c.close();
  else clearInterval(c);
  delete _sseConnections[id];
}

const SERVER_TS = { '.sv': 'timestamp' };

// ══════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════
let currentUser = null;
let currentChatListener = null;
let allRooms = [];
let allContacts = [];
let currentTab = 'all';
let nexusTyping = false;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let callTimerInterval = null;
let callSeconds = 0;
let pendingCall = null;
let notificationsEnabled = false;
let editMode = '';
let currentStoryIndex = 0;
let storyTimer = null;
let storyData = [];
let screenStack = [];
let currentScreen = 'splash';
let currentRoomId = null;
let currentChatName = '';
let currentChatInitials = '';
let currentChatUid = null;

// WebRTC
let localStream = null;
let remoteStream = null;
let peerConnection = null;
let callType = null;
let isCallInitiator = false;
let callDocId = null;
const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' },{ urls: 'stun:stun1.l.google.com:19302' }] };

const NEXUS_SYSTEM = `Tu es NEXUS, l'assistant IA intégré à Linkchat !
Application de messagerie avec : messagerie temps réel, appels WebRTC, stories, profil.
Réponds en français, de manière concise et utile.`;
let nexusHistory = [];

const COLORS = ['#dbeafe:#2563eb','#dcfce7:#16a34a','#fce7f3:#db2777','#fef3c7:#d97706','#f3e8ff:#9333ea','#fee2e2:#dc2626','#e0f2fe:#0284c7','#fef9c3:#ca8a04'];
function getColor(name) { let h=0; for(let c of name||'A') h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h%COLORS.length].split(':'); }
function initials(name) { if(!name) return '?'; const p=name.trim().split(' '); return (p.length>=2?(p[0][0]+p[1][0]):name.substring(0,2)).toUpperCase(); }
function timeAgo(ts) {
  if(!ts) return '';
  const now=Date.now(), diff=now-ts;
  if(diff<60000) return 'maintenant';
  if(diff<3600000) return Math.floor(diff/60000)+'min';
  if(diff<86400000) { const d=new Date(ts); return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }
  const d=new Date(ts),days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  if(diff<604800000) return days[d.getDay()];
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ══════════════════════════════════════════════
// FIREBASE ACTIONS
// ══════════════════════════════════════════════
window._firebaseActions = {
  signIn: async (displayName) => {
    const d = await fbSignInAnonymous();
    await fbUpdateProfile(displayName);
    _displayName = displayName;
    await fbSet(`users/${_uid}`, {
      displayName, uid: _uid, online: true,
      lastSeen: SERVER_TS, createdAt: SERVER_TS
    });
    currentUser = { uid: _uid, displayName };
    window._currentUser = currentUser;
    return currentUser;
  },

  sendMessage: async (roomId, text, type='text') => {
    if (!_uid || !text.trim()) return;
    await fbPush(`rooms/${roomId}/messages`, {
      text: text.trim(), type, senderId: _uid,
      senderName: _displayName || 'Moi',
      timestamp: SERVER_TS, read: false
    });
    await fbUpdate(`rooms/${roomId}`, {
      lastMessage: text.trim(), lastMessageTime: SERVER_TS, lastSenderId: _uid
    });
  },

  getOrCreateRoom: async (otherUid, otherName) => {
    if (!_uid) return null;
    const roomId = [_uid, otherUid].sort().join('_');
    const existing = await fbGet(`rooms/${roomId}`);
    if (!existing) {
      await fbSet(`rooms/${roomId}`, {
        id: roomId, isGroup: false, name: otherName,
        members: { [_uid]: true, [otherUid]: true },
        createdAt: SERVER_TS, lastMessage: '', lastMessageTime: SERVER_TS
      });
    }
    return roomId;
  },

  listenMessages: (roomId, callback) => {
    fbStopListen('messages');
    fbPoll(`rooms/${roomId}/messages`, (data) => {
      if (!data) { callback([]); return; }
      const msgs = Object.entries(data).map(([k,v]) => ({id:k,...v}));
      msgs.sort((a,b) => (a.timestamp||0)-(b.timestamp||0));
      callback(msgs.slice(-50));
    }, 'messages', 2000);
  },

  listenRooms: (callback) => {
    fbPoll('rooms', (data) => {
      if (!data) { callback([]); return; }
      const rooms = Object.entries(data)
        .map(([k,v]) => ({id:k,...v}))
        .filter(r => r.members && r.members[_uid]);
      rooms.sort((a,b) => (b.lastMessageTime||0)-(a.lastMessageTime||0));
      callback(rooms);
    }, 'rooms', 3000);
  },

  listenUsers: (callback) => {
    fbPoll('users', (data) => {
      if (!data) { callback([]); return; }
      const users = Object.entries(data)
        .map(([k,v]) => ({uid:k,...v}))
        .filter(u => u.uid !== _uid);
      callback(users);
    }, 'users', 5000);
  },

  updateProfile: async (displayName, status) => {
    await fbUpdateProfile(displayName);
    await fbUpdate(`users/${_uid}`, { displayName, status: status||'' });
    _displayName = displayName;
    currentUser = { ...currentUser, displayName, status };
    window._currentUser = currentUser;
  },

  initiateCall: async (roomId, type) => {
    const r = await fbPush(`calls/${roomId}`, {
      type, initiatorId: _uid, status: 'calling',
      offer: null, answer: null, timestamp: SERVER_TS
    });
    callDocId = r.name;
    return r.name;
  },
  setOffer: async (roomId, callId, offer) => { await fbUpdate(`calls/${roomId}/${callId}`, { offer: JSON.stringify(offer) }); },
  setAnswer: async (roomId, callId, answer) => { await fbUpdate(`calls/${roomId}/${callId}`, { answer: JSON.stringify(answer), status: 'connected' }); },
  addIceCandidate: async (roomId, callId, candidate, role) => { await fbPush(`calls/${roomId}/${callId}/ice_${role}`, JSON.stringify(candidate)); },
  listenCall: (roomId, callId, callback) => {
    fbPoll(`calls/${roomId}/${callId}`, callback, `call_${callId}`, 1500);
  },
  listenIce: (roomId, callId, role, callback) => {
    let lastCount = 0;
    fbPoll(`calls/${roomId}/${callId}/ice_${role}`, (data) => {
      if (!data) return;
      const items = Object.values(data);
      if (items.length > lastCount) {
        items.slice(lastCount).forEach(i => callback(JSON.parse(i)));
        lastCount = items.length;
      }
    }, `ice_${role}_${callId}`, 1500);
  },
  endCall: async (roomId, callId) => { await fbUpdate(`calls/${roomId}/${callId}`, { status: 'ended' }); }
};

// ══════════════════════════════════════════════
// WebRTC
// ══════════════════════════════════════════════
window._webrtc = {
  startCall: async (roomId, type) => {
    callType = type; isCallInitiator = true;
    try { localStream = await navigator.mediaDevices.getUserMedia(type==='video'?{audio:true,video:{facingMode:'user'}}:{audio:true,video:false}); }
    catch(e) { toast('❌ Accès micro/caméra refusé'); return; }
    showCallScreen(type, true);
    peerConnection = new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => setRemoteStream(e.streams[0]);
    peerConnection.onicecandidate = async e => { if(e.candidate && callDocId) await window._firebaseActions.addIceCandidate(roomId, callDocId, e.candidate.toJSON(), 'initiator'); };
    const callId = await window._firebaseActions.initiateCall(roomId, type);
    callDocId = callId;
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await window._firebaseActions.setOffer(roomId, callId, offer);
    window._firebaseActions.listenCall(roomId, callId, async (data) => {
      if(data?.answer && peerConnection.signalingState!=='stable' && !peerConnection.currentRemoteDescription) {
        try { await peerConnection.setRemoteDescription(JSON.parse(data.answer)); } catch(e){}
      }
      if(data?.status==='ended') window._webrtc.endCall(roomId);
    });
    window._firebaseActions.listenIce(roomId, callId, 'receiver', async c => { try { await peerConnection.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} });
    setLocalStream(localStream);
  },
  answerCall: async (roomId, callId, type) => {
    callType = type; isCallInitiator = false;
    try { localStream = await navigator.mediaDevices.getUserMedia(type==='video'?{audio:true,video:{facingMode:'user'}}:{audio:true,video:false}); }
    catch(e) { toast('❌ Accès micro/caméra refusé'); return; }
    showCallScreen(type, false);
    peerConnection = new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = e => setRemoteStream(e.streams[0]);
    peerConnection.onicecandidate = async e => { if(e.candidate) await window._firebaseActions.addIceCandidate(roomId, callId, e.candidate.toJSON(), 'receiver'); };
    const callData = await fbGet(`calls/${roomId}/${callId}`);
    await peerConnection.setRemoteDescription(JSON.parse(callData.offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await window._firebaseActions.setAnswer(roomId, callId, answer);
    window._firebaseActions.listenIce(roomId, callId, 'initiator', async c => { try { await peerConnection.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} });
    window._firebaseActions.listenCall(roomId, callId, d => { if(d?.status==='ended') window._webrtc.endCall(roomId); });
    setLocalStream(localStream);
  },
  endCall: (roomId) => {
    if(peerConnection){peerConnection.close();peerConnection=null;}
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    remoteStream=null;
    if(callDocId&&roomId) window._firebaseActions.endCall(roomId, callDocId).catch(()=>{});
    callDocId=null; isCallInitiator=false;
    hideCallScreen();
  },
  toggleMute: () => { if(!localStream) return false; const t=localStream.getAudioTracks()[0]; if(t){t.enabled=!t.enabled;return !t.enabled;} return false; },
  toggleVideo: () => { if(!localStream) return false; const t=localStream.getVideoTracks()[0]; if(t){t.enabled=!t.enabled;return !t.enabled;} return false; },
  switchCamera: async () => {
    if(!localStream) return;
    const vt=localStream.getVideoTracks()[0]; if(!vt) return;
    const fm=vt.getSettings().facingMode;
    const ns=await navigator.mediaDevices.getUserMedia({video:{facingMode:fm==='user'?'environment':'user'},audio:true});
    if(peerConnection){const s=peerConnection.getSenders().find(s=>s.track?.kind==='video');if(s)s.replaceTrack(ns.getVideoTracks()[0]);}
    localStream.getVideoTracks().forEach(t=>t.stop());
    setLocalStream(ns);
  }
};

window._nexusChat = async (msg) => {
  nexusHistory.push({role:'user',content:msg});
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:NEXUS_SYSTEM,messages:nexusHistory})
  });
  const data = await res.json();
  const reply = data.content?.map(b=>b.text||'').join('')||'Désolé, erreur.';
  nexusHistory.push({role:'assistant',content:reply});
  return reply;
};

function setLocalStream(s){const v=document.getElementById('localVideo');if(v){v.srcObject=s;v.muted=true;}}
function setRemoteStream(s){const v=document.getElementById('remoteVideo'),a=document.getElementById('remoteAudio');if(v)v.srcObject=s;if(a)a.srcObject=s;}
function showCallScreen(type,isInit){
  document.getElementById('callScreen').classList.remove('hidden');
  document.getElementById('callVideoRow').style.display=type==='video'?'flex':'none';
  document.getElementById('callAudioOnly').style.display=type==='audio'?'flex':'none';
  document.getElementById('callStatus').textContent=isInit?'Appel en cours…':'Connexion…';
}
function hideCallScreen(){
  document.getElementById('callScreen').classList.add('hidden');
  ['localVideo','remoteVideo','remoteAudio'].forEach(id=>{const el=document.getElementById(id);if(el)el.srcObject=null;});
}
</script>

<style>

.splash-name { font-size:2.4rem; font-weight:800; color:#fff; letter-spa
